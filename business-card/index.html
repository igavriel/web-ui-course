<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ilan Gavriel — Digital Business Card</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="page">
    <div class="card-container" id="card" role="button" aria-label="Flip business card" tabindex="0">
      <div class="card">

        <!-- ═══════════ FRONT SIDE ═══════════ -->
        <div class="card-face card-front">
          <span class="front-name">Ilan G.</span>

          <div class="front-icons">
            <span class="front-icon" style="--i:0" aria-hidden="true">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="18" r="2.5"/>
                <circle cx="6" cy="6" r="2.5"/>
                <circle cx="18" cy="6" r="2.5"/>
                <path d="M6 8.5v1.5a3 3 0 0 0 3 3h6a3 3 0 0 0 3-3V8.5"/>
                <line x1="12" y1="13" x2="12" y2="15.5"/>
              </svg>
            </span>
            <span class="front-icon" style="--i:1" aria-hidden="true">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="16 18 22 12 16 6"/>
                <polyline points="8 6 2 12 8 18"/>
                <line x1="14" y1="4" x2="10" y2="20"/>
              </svg>
            </span>
            <span class="front-icon" style="--i:2" aria-hidden="true">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="4 17 10 11 4 5"/>
                <line x1="12" y1="19" x2="20" y2="19"/>
              </svg>
            </span>
            <span class="front-icon" style="--i:3" aria-hidden="true">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="7" width="20" height="10" rx="5"/>
                <path d="M8 10v4M6 12h4"/>
                <circle cx="16.5" cy="10.5" r="1" fill="currentColor" stroke="none"/>
                <circle cx="18.5" cy="13" r="1" fill="currentColor" stroke="none"/>
              </svg>
            </span>
          </div>

          <a class="front-url" href="https://igavriel.github.io/portfolio" target="_blank" rel="noopener">igavriel.github.io/portfolio</a>
        </div>

        <!-- ═══════════ BACK SIDE ═══════════ -->
        <div class="card-face card-back">

          <div class="editor-titlebar">
            <div class="window-controls">
              <span class="dot dot-close"></span>
              <span class="dot dot-minimize"></span>
              <span class="dot dot-maximize"></span>
            </div>
            <span class="editor-filename">ilan-gavriel.json</span>
          </div>

          <div class="editor-body">
            <div class="code-line"><span class="ln">1</span><span class="code"><span class="bracket">{</span></span></div>
            <div class="code-line"><span class="ln">2</span><span class="code">  <span class="key">"name"</span><span class="punct">: </span><span class="str">"Ilan Gavriel"</span><span class="punct">,</span></span></div>
            <div class="code-line"><span class="ln">3</span><span class="code">  <span class="key">"title"</span><span class="punct">: </span><span class="str">"Game Design Development and Software Architect"</span><span class="punct">,</span></span></div>
            <div class="code-line"><span class="ln">4</span><span class="code">  <span class="key">"email"</span><span class="punct">: </span><span class="str">"<a class="card-link" href="mailto:igavriel@gmail.com">igavriel@gmail.com</a>"</span><span class="punct">,</span></span></div>
            <div class="code-line"><span class="ln">5</span><span class="code">  <span class="key">"linkedin"</span><span class="punct">: </span><span class="str">"<a class="card-link" href="https://linkedin.com/in/igavriel" target="_blank" rel="noopener">linkedin.com/in/igavriel</a>"</span><span class="punct">,</span></span></div>
            <div class="code-line"><span class="ln">6</span><span class="code">  <span class="key">"portfolio"</span><span class="punct">: </span><span class="str">"<a class="card-link" href="https://igavriel.github.io/portfolio" target="_blank" rel="noopener">igavriel.github.io/portfolio</a>"</span></span></div>
            <div class="code-line"><span class="ln">7</span><span class="code"><span class="bracket">}</span></span></div>
          </div>

          <div class="editor-statusbar">
            <div class="statusbar-icons" aria-hidden="true">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="18" r="2.5"/>
                <circle cx="6" cy="6" r="2.5"/>
                <circle cx="18" cy="6" r="2.5"/>
                <path d="M6 8.5v1.5a3 3 0 0 0 3 3h6a3 3 0 0 0 3-3V8.5"/>
                <line x1="12" y1="13" x2="12" y2="15.5"/>
              </svg>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="16 18 22 12 16 6"/>
                <polyline points="8 6 2 12 8 18"/>
                <line x1="14" y1="4" x2="10" y2="20"/>
              </svg>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="4 17 10 11 4 5"/>
                <line x1="12" y1="19" x2="20" y2="19"/>
              </svg>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="7" width="20" height="10" rx="5"/>
                <path d="M8 10v4M6 12h4"/>
                <circle cx="16.5" cy="10.5" r="1" fill="currentColor" stroke="none"/>
                <circle cx="18.5" cy="13" r="1" fill="currentColor" stroke="none"/>
              </svg>
            </div>
          </div>

        </div>

      </div>
    </div>

    <p class="hint">click to flip</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
